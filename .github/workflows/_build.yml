name: build ws-server

on:
  workflow_call:
    inputs:
      windows-artifact-name:
        type: string
        default: windows-zip
      linux-artifact-name:
        type: string
        default: linux-zip
      linux-appimage-artifact-name:
        type: string
        default: linux-appimage
      retention-days:
        type: number
        default: 0

permissions:
  contents: read
  id-token: write
  attestations: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: setup rust
        uses: dtolnay/rust-toolchain@stable

      - name: rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ws-server/src-tauri

      - name: build ws-server exe
        working-directory: ws-server/src-tauri
        run: cargo build --release

      - name: attest windows build provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: ws-server/src-tauri/target/release/input-overlay-ws.exe

      - name: upload windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.windows-artifact-name }}
          path: ws-server/src-tauri/target/release/input-overlay-ws.exe
          retention-days: ${{ inputs.retention-days }}

  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libudev-dev

      - name: setup rust
        uses: dtolnay/rust-toolchain@stable

      - name: rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ws-server/src-tauri

      - name: install tauri-cli
        run: cargo install tauri-cli --locked

      - name: build ws-server binary
        working-directory: ws-server/src-tauri
        run: cargo build --release

      - name: attest linux build provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: ws-server/src-tauri/target/release/input-overlay-ws

      - name: upload linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.linux-artifact-name }}
          path: ws-server/src-tauri/target/release/input-overlay-ws
          retention-days: ${{ inputs.retention-days }}

      - name: build AppImage
        working-directory: ws-server/src-tauri
        run: cargo tauri build --bundles appimage

      - name: upload linux appimage artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.linux-appimage-artifact-name }}
          path: ws-server/src-tauri/target/release/bundle/appimage/input-overlay-ws_*.AppImage
          retention-days: ${{ inputs.retention-days }}
