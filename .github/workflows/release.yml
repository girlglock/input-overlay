name: release ws-server

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    uses: ./.github/workflows/_build.yml
    with:
      windows-artifact-name: windows-zip
      linux-artifact-name: linux-zip
      linux-appimage-artifact-name: linux-appimage

  release:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: download windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-zip

      - name: download linux artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-zip

      - name: download linux appimage artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-appimage

      - name: create release zips
        run: |
          zip input-overlay-ws-windows.zip input-overlay-ws.exe
          zip input-overlay-ws-linux.zip input-overlay-ws
          mv input-overlay-ws_*.AppImage input-overlay-ws.AppImage

      - name: attest release artifacts
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: |
            input-overlay-ws-windows.zip
            input-overlay-ws-linux.zip
            input-overlay-ws.AppImage

      - name: get previous tag
        id: prev_tag
        run: |
          prev=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          echo "tag=$prev" >> "$GITHUB_OUTPUT"

      - name: make release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            input-overlay-ws-windows.zip
            input-overlay-ws-linux.zip
            input-overlay-ws.AppImage
          body: |
            ## input-overlay websocket server ${{ github.ref_name }}

            # **Patchnotes:**

            -

            # **Setup:**
            <details>
            <summary><b>windows setup</b></summary>
            <br>

            - download `input-overlay-ws-windows.zip`
            - unzip and run `input-overlay-ws.exe`
            - right-click the tray icon for settings

            > [!NOTE]
            > you might need to run the ws server as admin when tabbed into apps that run with admin elevations themselves
            > the "start with windows" checkbox will automatically start the ws server with admin rights on the next boot

            </details>

            <details>
            <summary><b>linux setup (experimental)</b></summary>
            <br>

            download `input-overlay-ws-linux.zip` and unzip it, then follow the steps below.

            **1. install runtime dependencies**

            ```bash
            # debian / ubuntu
            sudo apt-get install libwebkit2gtk-4.1-0 libgtk-3-0 libayatana-appindicator3-1 librsvg2-2

            # fedora
            sudo dnf install webkit2gtk4.1 gtk3 libayatana-appindicator librsvg2

            # arch
            sudo pacman -S webkit2gtk-4.1 gtk3 libayatana-appindicator librsvg
            ```

            an appimage build is also available which should run on most distros without installing dependencies at the cost of being hughmungous in comparison

            **2. add yourself to the `input` group**

            standard distros:
            ```bash
            sudo usermod -aG input $USER
            ```

            if the one above fails to add you to the group you might be on a immutable distro (bazzite, bluefin, openSUSE Aeon, etc etc). try this then:
            ```bash
            echo "input:x:$(getent group input | cut -d: -f3):$USER" | sudo tee -a /etc/group
            ```

            **3. analog support** *(optional)*

            ```bash
            printf '%s\n' \
              'KERNEL=="hidraw*", SUBSYSTEM=="hidraw", MODE="0660", GROUP="input"' \
              'SUBSYSTEM=="usb", ATTRS{idVendor}=="31e3", MODE="0660", GROUP="input"' \
              'SUBSYSTEM=="usb", ATTRS{idVendor}=="03eb", MODE="0660", GROUP="input"' \
              'SUBSYSTEM=="usb", ATTRS{idVendor}=="1532", MODE="0660", GROUP="input"' \
              'SUBSYSTEM=="usb", ATTRS{idVendor}=="19f5", MODE="0660", GROUP="input"' \
              'SUBSYSTEM=="usb", ATTRS{idVendor}=="352d", MODE="0660", GROUP="input"' \
              'SUBSYSTEM=="usb", ATTRS{idVendor}=="3434", MODE="0660", GROUP="input"' \
              'SUBSYSTEM=="usb", ATTRS{idVendor}=="362d", MODE="0660", GROUP="input"' \
              'SUBSYSTEM=="usb", ATTRS{idVendor}=="373b", MODE="0660", GROUP="input"' \
              'SUBSYSTEM=="usb", ATTRS{idVendor}=="372e", MODE="0660", GROUP="input"' \
              | sudo tee /etc/udev/rules.d/99-analog.rules
            sudo udevadm control --reload-rules && sudo udevadm trigger
            ```

            **4.** reboot

            **5.** run `./input-overlay-ws`

            **6.** right-click the tray icon and open **settings -> devices** to pick your keyboard and mouse evdev devices.

            some mice and keyboards might show up duplicate (nkro, wireless dongle, keyboard mouse button emulation for macros, mouse keyboard macros etc etc), you will just kinda have to try and error them)

            </details>

            ---
            > [!WARNING]
            > all builds are created via github actions directly from the repo sources
            > the ws server might occasionally trigger a false positive on windows defender due to it not being signed and how we handle rawinputbuffer reads via an "invisible background window"
            > alternatively you can build the ws server yourself. see the readme for instructions :p

            ${{ steps.prev_tag.outputs.tag != '' && format('[CHANGELOG]({0}/{1}/compare/{2}...{3})', github.server_url, github.repository, steps.prev_tag.outputs.tag, github.ref_name) || 'First release.' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
